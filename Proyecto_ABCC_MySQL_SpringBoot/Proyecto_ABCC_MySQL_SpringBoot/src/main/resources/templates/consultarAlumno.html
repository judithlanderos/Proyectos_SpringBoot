<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consulta Alumno</title>

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <div class="card">

        <div class="card-header">
            <h3>Consulta de Alumno</h3>
        </div>

        <div class="card-body">

            <p><strong>Número de Control:</strong>
                <span th:text="${alumno.num_Control}"></span>
            </p>

            <p><strong>Nombre:</strong>
                <span th:text="${alumno.nombre}"></span>
            </p>

            <p><strong>Primer Apellido:</strong>
                <span th:text="${alumno.primer_Ap}"></span>
            </p>

            <p><strong>Segundo Apellido:</strong>
                <span th:text="${alumno.segundo_Ap}"></span>
            </p>

            <p><strong>Semestre:</strong>
                <span th:text="${alumno.semestre}"></span>
            </p>

            <p><strong>Carrera:</strong>
                <span th:text="${alumno.carrera}"></span>
            </p>

            <a th:href="@{/}" class="btn btn-secondary">
                Regresar
            </a>

        </div>

    </div>

</div>

</body>
</html>

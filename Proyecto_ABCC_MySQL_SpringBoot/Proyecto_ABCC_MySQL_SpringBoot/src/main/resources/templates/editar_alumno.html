<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Alumno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        h1 { color: #0c0002; font-weight: bold; text-align: center; margin: 30px 0; }
    </style>
</head>
<body>
    <h1>Servicios Escolares</h1>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>Editar Alumno</h2>
            </div>
            <div class="card-body">
                <form th:action="@{/guardarAlumno}" th:object="${alumno}" method="POST">

                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-3">
                        <label class="form-label">Número de Control</label>
                        <input type="text" th:field="*{num_Control}" class="form-control" placeholder="Ej.01">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Primer Apellido</label>
                        <input type="text" th:field="*{primer_Ap}" class="form-control" placeholder="Apellido">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Segundo Apellido</label>
                        <input type="text" th:field="*{segundo_Ap}" class="form-control" placeholder="Apellido">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fecha de Nacimiento</label>
                        <input type="date" th:field="*{fecha_nac}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Semestre</label>
                        <input type="number" th:field="*{semestre}" class="form-control" placeholder="Semestre" min="1" max="12">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Carrera</label>
                        <input type="text" th:field="*{carrera}" class="form-control" placeholder="Carrera">
                    </div>

                    <button type="submit" class="btn btn-primary">Actualizar</button>
                    <a th:href="@{/}" class="btn btn-secondary ms-2">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
